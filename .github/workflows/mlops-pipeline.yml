name: Bangalore Traffic MLOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run Data Generation
      run: python generate_data.py
      
    - name: Run Model Training
      run: python train.py
      env:
        MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Upload Model to S3
      run: |
        aws s3 cp models/model.pkl s3://${{ secrets.S3_BUCKET_NAME }}/models/traffic_model_${{ github.sha }}.pkl
        aws s3 cp models/encoders.pkl s3://${{ secrets.S3_BUCKET_NAME }}/models/encoders_${{ github.sha }}.pkl

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build, tag, and push image to Amazon ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: bangalore-traffic-ai
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

    - name: Update Kubernetes Manifest
      run: |
        sed -i "s|storageUri:.*|storageUri: s3://${{ secrets.S3_BUCKET_NAME }}/models/traffic_model_${{ github.sha }}.pkl|g" k8s/inference.yaml
        
    - name: Commit and push changes
      run: |
        git config --global user.name 'github-actions'
        git config --global user.email 'github-actions@github.com'
        git add k8s/inference.yaml
        git commit -m "chore: update model path to ${{ github.sha }} [skip ci]"
        git push

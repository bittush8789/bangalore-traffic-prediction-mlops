apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bangalore-traffic-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/bittush8789/bangalore-traffic-prediction-mlops.git
    targetRevision: HEAD
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: ml-deploy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true

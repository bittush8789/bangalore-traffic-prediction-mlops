apiVersion: v1
kind: ServiceAccount
metadata:
  name: s3-sa
  namespace: ml-deploy
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::your-account-id:role/s3-access-role
---
apiVersion: v1
kind: Secret
metadata:
  name: aws-secret
  namespace: ml-deploy
type: Opaque
data:
  AWS_ACCESS_KEY_ID: <base64-encoded-key>
  AWS_SECRET_ACCESS_KEY: <base64-encoded-secret>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLR Traffic AI | MLOps Prediction Platform</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="dashboard">
        <header>
            <h1>Bangalore Traffic AI</h1>
            <p>Production-Grade MLOps Prediction Platform</p>
        </header>
        
        <div class="main-content">
            <div class="form-section">
                <h2>Commute Details</h2>
                <form id="prediction-form">
                    <div class="input-grid">
                        <div class="input-group">
                            <label>Area Name</label>
                            <select name="area_name" required>
                                <option value="Silk Board">Silk Board</option>
                                <option value="Whitefield">Whitefield</option>
                                <option value="Electronic City">Electronic City</option>
                                <option value="Koramangala">Koramangala</option>
                                <option value="Hebbal">Hebbal</option>
                                <option value="Outer Ring Road">Outer Ring Road</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>Hour (24h)</label>
                            <input type="number" name="hour" min="0" max="23" value="9" required>
                        </div>
                        <div class="input-group">
                            <label>Day of Week</label>
                            <select name="day_of_week" required>
                                <option value="Monday">Monday</option>
                                <option value="Tuesday">Tuesday</option>
                                <option value="Wednesday">Wednesday</option>
                                <option value="Thursday">Thursday</option>
                                <option value="Friday">Friday</option>
                                <option value="Saturday">Saturday</option>
                                <option value="Sunday">Sunday</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>Weather</label>
                            <select name="weather" required>
                                <option value="Clear">Clear</option>
                                <option value="Rainy">Rainy</option>
                                <option value="Thunderstorm">Thunderstorm</option>
                                <option value="Fog">Fog</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>Distance (km)</label>
                            <input type="number" name="route_distance" step="0.1" value="10.5" required>
                        </div>
                        <div class="input-group">
                            <label>Holiday</label>
                            <select name="holiday" required>
                                <option value="0">No</option>
                                <option value="1">Yes</option>
                            </select>
                        </div>
                        
                        <!-- Hidden defaults for simplified demo -->
                        <input type="hidden" name="rainfall" value="0.0">
                        <input type="hidden" name="road_type" value="Main Road">
                        <input type="hidden" name="event_nearby" value="0">
                        <input type="hidden" name="accident_reported" value="0">
                        <input type="hidden" name="traffic_volume" value="1200">

                        <button type="submit" class="btn-predict">
                            <span id="btn-text">Predict Congestion</span>
                            <div id="loader" class="loader"></div>
                        </button>
                    </div>
                </form>
            </div>
            
            <div class="result-section">
                <h2>Traffic Intelligence</h2>
                <div id="result-placeholder" class="result-placeholder">
                    <p>Enter details and click predict to see AI insights</p>
                </div>
                
                <div id="result-display" class="result-display">
                    <div class="metric-card">
                        <h4>Predicted Congestion</h4>
                        <p id="res-level">—</p>
                        <span id="res-badge" class="badge"></span>
                    </div>
                    
                    <div class="metric-card" style="border-left-color: var(--accent-purple);">
                        <h4>Estimated Travel Time</h4>
                        <p id="res-time">—</p>
                    </div>
                    
                    <div class="metric-card" style="border-left-color: #10b981;">
                        <h4>AI Recommendation</h4>
                        <p id="res-suggestion" style="font-size: 1rem; color: #10b981;">—</p>
                    </div>

                    <div style="margin-top: 20px; font-size: 0.75rem; color: var(--text-secondary); text-align: center;">
                        Model Confidence: <span id="res-conf">0%</span> | Latency: <span id="res-lat">0ms</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
